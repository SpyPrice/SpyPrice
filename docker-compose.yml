services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-price_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-price_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-price_tracker}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      ETL_API_KEY: ${ETL_API_KEY:-change-me-etl-key}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  etl:
    build:
      context: ./etl
    environment:
      API_BASE_URL: http://backend:8000
      ETL_API_KEY: ${ETL_API_KEY:-change-me-etl-key}
      REQUEST_TIMEOUT_SECONDS: 20
      MAX_RETRIES: 3
      FETCH_DELAY_SECONDS: 1
      DEMO_ITEMS: ${DEMO_ITEMS:-}
    depends_on:
      - backend
    profiles: ["manual"]

volumes:
  pg_data:
