server {
    listen 80;
    server_name localhost;  # или ваш локальный домен

    # Сжатие (gzip) для уменьшения размера передаваемых данных
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Корень со статикой React (собранные файлы)
    root /usr/share/nginx/html;
    index index.html;

    # 1. Проксирование запросов к API на бэкенд
    location /api/ {
        proxy_pass http://backend:8000/;   # ваш бэкенд-сервис
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2. Статические ассеты (JS, CSS, изображения) – кэшируем надолго
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # 3. Все остальные маршруты – отдаём index.html (для React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 4. Запрет доступа к скрытым файлам (.env, .git и т.д.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}